<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="OpsPilot AI internal operations automation dashboard">
    <title>OpsPilot AI</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <aside class="rail" aria-label="Primary navigation">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">OP</div>
          <div>
            <strong>OpsPilot</strong>
            <span>AI Operations</span>
          </div>
        </div>
        <nav id="nav"></nav>
        <button class="ghost" data-action="seed" type="button">Seed demo</button>
      </aside>
      <main class="stage">
        <header class="topbar">
          <div>
            <p class="eyebrow">Internal Operations Automation</p>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <div class="status-strip" id="statusStrip">
            <span id="statusDot"></span>
            <b id="apiStatus">Connecting</b>
          </div>
        </header>
        <section class="overview">
          <div class="metric clickable" data-nav="tickets">
            <span>Total Tickets</span>
            <strong id="metricTickets">0</strong>
          </div>
          <div class="metric clickable" data-nav="tickets">
            <span>Critical</span>
            <strong id="metricCritical">0</strong>
          </div>
          <div class="metric clickable" data-nav="leave">
            <span>Leave Queue</span>
            <strong id="metricLeaves">0</strong>
          </div>
          <div class="metric clickable" data-nav="tasks">
            <span>Open Tasks</span>
            <strong id="metricTasks">0</strong>
          </div>
        </section>
        <section class="workspace">
          <div class="canvas-panel">
            <div class="panel-head">
              <div>
                <span class="label">Workspace</span>
                <h2 id="viewTitle">Dashboard</h2>
              </div>
              <div class="tiny-chart" id="tinyChart" aria-label="Operational activity trend"></div>
            </div>
            <div id="view"></div>
          </div>
          <aside class="model-panel" aria-label="AI automation panel">
            <div class="model">
              <div class="model-plane plane-a"></div>
              <div class="model-plane plane-b"></div>
              <div class="model-plane plane-c"></div>
              <div class="node node-a">n8n</div>
              <div class="node node-b">LangGraph</div>
              <div class="node node-c">RAG</div>
              <div class="node node-d">Ollama</div>
            </div>
            <div class="agent-box">
              <div class="agent-head">
                <span class="label">Ops Agent</span>
                <span class="chip" id="agentProviderBadge">Local</span>
              </div>
              <div id="agentLog" class="agent-log"></div>
              <form id="agentForm" class="agent-form">
                <input id="agentInput" name="message" autocomplete="off" placeholder="Ask about tickets, leave, docs, risk">
                <button type="submit" aria-label="Send message"></button>
              </form>
            </div>
          </aside>
        </section>
      </main>
    </div>
    <div id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
