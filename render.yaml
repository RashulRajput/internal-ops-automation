services:
  - type: web
    name: opspilot
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: AI_PROVIDER_MODE
        value: free-first
      - key: INTERNALOPS_DB
        value: /data/internalops.db
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
    disk:
      name: opspilot-data
      mountPath: /data
      sizeGB: 1
